<!DOCTYPE html>
<html>

  <title>HomeBase</title>
  <link rel="stylesheet" href="./style.css" />

<body>
  <main class="app">

      <div class="card"><h2>Demi</h2><p class="balance">$40.00</p><span>Starting balance</span></div>
      <div class="card"><h2>Elise</h2><p class="balance">$40.00</p><span>Starting balance</span></div>

</html>
